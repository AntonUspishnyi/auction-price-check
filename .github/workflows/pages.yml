name: Deploy static app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pushing to the gh-pages branch needs write access to repo contents.
permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static site
        run: npm run build
      - name: Deploy to gh-pages (production, served at site root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # keep_files preserves the /pr-preview/* folders so a production
          # deploy never wipes open PR previews living on the same branch.
          keep_files: true
