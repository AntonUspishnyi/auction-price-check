name: Deploy PR preview

# Builds every pull request and publishes it to a unique URL on the same
# Pages site, e.g. https://antonuspishnyi.github.io/auction-price-check/pr-preview/pr-<N>/
# The preview link is posted as a comment on the PR and removed when the PR closes.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write       # push the preview to the gh-pages branch
  pull-requests: write  # post/update the preview link comment

concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static site
        if: github.event.action != 'closed'
        run: npm run build
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist/
